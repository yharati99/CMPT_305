<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script>
        window.L_DISABLE_3D = true;
    </script>
    <title>Map</title>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomAnimation: false,
        fadeAnimation: false,
        markerZoomAnimation: false
    }).setView([53.5461, -113.4938], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var allMarkers = {};

    function zoomToLocation(lat, lon) {
        map.setView([lat, lon], 14);
    }

    function clearMarkers() {
        map.eachLayer(function(layer) {
            if (layer instanceof L.Marker) {
                map.removeLayer(layer);
            }
        });
        allMarkers = {};
    }

    function addMarker(lat, lon, label) {
        var marker = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(label);

        var key = lat + "," + lon;
        allMarkers[key] = marker;
    }

    var redSchoolIcon = new L.Icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.3.1/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });

    function addSchoolMarker(lat, lon, schoolName) {
        var marker = L.marker([lat, lon], {icon: redSchoolIcon}).addTo(map);

        marker.bindPopup("<b>" + schoolName + "</b>").openPopup();

    }

    function highlightMarker(lat, lon) {
        var key = lat + "," + lon;
        var markerToHighlight = allMarkers[key];

        if (markerToHighlight) {
            map.setView([lat, lon], 15);

            markerToHighlight.openPopup();
        }
    }

    new ResizeObserver(function() {
        map.invalidateSize();
    }).observe(document.getElementById('map'));
</script>
</body>
</html>
