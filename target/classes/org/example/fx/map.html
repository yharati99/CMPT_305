<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }
    </style>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script>
        window.L_DISABLE_3D = true;
    </script>
    <title>Map</title>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // Initialize the map with animations turned off
    const map = L.map('map', {
        zoomAnimation: false,
        fadeAnimation: false,
        markerZoomAnimation: false
    }).setView([53.5461, -113.4938], 11);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // NEW 1: Create a dictionary to remember all our markers
    var allMarkers = {};

    // Set Map Zoom
    function zoomToLocation(lat, lon) {
        map.setView([lat, lon], 14);
    }

    function clearMarkers() {
        map.eachLayer(function(layer) {
            if (layer instanceof L.Marker) {
                map.removeLayer(layer);
            }
        });
        // NEW 2: Clear our dictionary when markers are cleared
        allMarkers = {};
    }

    function addMarker(lat, lon, label) {
        var marker = L.marker([lat, lon])
            .addTo(map)
            .bindPopup(label);

        // NEW 3: Save the marker using its coordinates as a unique key
        var key = lat + "," + lon;
        allMarkers[key] = marker;
    }

    // NEW 4: Add the highlight function that Java will call
    function highlightMarker(lat, lon) {
        var key = lat + "," + lon;
        var markerToHighlight = allMarkers[key];

        if (markerToHighlight) {
            // Center the map on the marker (zoom level 15 is nice and close)
            map.setView([lat, lon], 15);

            // Pop open the tooltip!
            markerToHighlight.openPopup();
        }
    }

    // Force resize recalculation
    new ResizeObserver(function() {
        map.invalidateSize();
    }).observe(document.getElementById('map'));
</script>
</body>
</html>
